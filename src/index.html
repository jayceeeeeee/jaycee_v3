<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jaycee</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="app-layout">
        <section class="canvas-shell">
          <div id="canvas-container" class="canvas-container"></div>
        </section>

        <button
          id="panel-toggle"
          class="panel-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="info-panel"
        >
          Menu
        </button>

        <div id="panel-backdrop" class="panel-backdrop" hidden></div>

        <aside id="info-panel" class="info-panel" aria-label="Information panel">
          <div class="panel-header">
            <p class="panel-eyebrow">Jaycee</p>
            <h1>Constants</h1>
            <p class="panel-description">
              Live date, position, and solar timing.
            </p>
          </div>

          <section class="panel-section" aria-labelledby="panel-derived-title">
            <h2 id="panel-derived-title">Computed</h2>
            <dl class="info-list">
              <div class="info-row">
                <dt>Time</dt>
                <dd id="info-time">-</dd>
              </div>
              <div class="info-row">
                <dt>Hebrew Date</dt>
                <dd id="info-hebrew-date">-</dd>
              </div>
              <div class="info-row">
                <dt>Looking Azimuth</dt>
                <dd id="info-azimuth">-</dd>
              </div>
            </dl>
          </section>

          <section class="panel-section" aria-labelledby="panel-solar-title">
            <h2 id="panel-solar-title">Solar</h2>
            <dl class="info-list">
              <div class="info-row">
                <dt>Sunrise</dt>
                <dd id="info-sunrise">-</dd>
              </div>
              <div class="info-row">
                <dt>Sunset</dt>
                <dd id="info-sunset">-</dd>
              </div>
            </dl>
          </section>

          <section class="panel-section" aria-labelledby="panel-controls-title">
            <h2 id="panel-controls-title">Personalize</h2>

            <div class="control-group">
              <label class="control-label" for="control-date">Base Date And Time</label>
              <input id="control-date" class="control-input" type="datetime-local" />
              <div class="control-actions">
                <button id="control-date-apply" class="control-button" type="button">Apply Date</button>
                <button id="control-date-reset" class="control-button control-button-secondary" type="button">Use Now</button>
              </div>
            </div>

            <div class="control-group">
              <div class="slider-header">
                <label class="control-label" for="control-time-slider">Time Slider</label>
                <span id="control-time-slider-value" class="slider-value">00:00</span>
              </div>
              <input
                id="control-time-slider"
                class="control-slider"
                type="range"
                min="0"
                max="1439"
                step="1"
              />
              <div class="slider-scale">
                <span>00:00</span>
                <span>12:00</span>
                <span>23:59</span>
              </div>
            </div>

            <div class="control-group">
              <label class="control-label" for="control-location-query">Search Place</label>
              <div class="control-inline">
                <input
                  id="control-location-query"
                  class="control-input"
                  type="text"
                  placeholder="Sapporo, Tokyo, Jerusalem..."
                />
                <button id="control-location-search" class="control-button" type="button">Find</button>
              </div>
            </div>

            <div class="control-grid">
              <div class="control-group">
                <label class="control-label" for="control-lat">Latitude</label>
                <input id="control-lat" class="control-input" type="number" step="any" />
              </div>

              <div class="control-group">
                <label class="control-label" for="control-lon">Longitude</label>
                <input id="control-lon" class="control-input" type="number" step="any" />
              </div>
            </div>

            <div class="control-actions">
              <button id="control-coordinates-apply" class="control-button" type="button">Apply Coordinates</button>
              <button id="control-location-now" class="control-button control-button-secondary" type="button">Use My Location</button>
            </div>

            <p id="control-status" class="control-status" data-tone="muted"></p>
          </section>
        </aside>
      </main>
    </div>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"
      defer
    ></script>
    <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
    <script type="module" src="scripts/main.js" defer></script>
  </body>
</html>
